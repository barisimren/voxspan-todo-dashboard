<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#FAFAFA;color:#1E2D7A;min-height:100vh}

.panel.active{display:block}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-thumb{background:#E2E0F0;border-radius:2px}
.tab.add-tab-btn{color:#8A8AA8;border:1.5px dashed #C4C2D8;border-radius:20px;padding:4px 12px;background:none;cursor:pointer;font-size:13px;}
.tab.add-tab-btn:hover{color:#5B3FD0;border-color:#5B3FD0;background:#F2EFFE;}

.add-tab-form.open{display:flex;}

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.2/dist/confetti.browser.min.js"></script>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script>
// ─── Firebase ────────────────────────────────────────────────────────────────
let db, REF;
let mySaveTime = 0;
const addedCustomIds = new Set();
// These must be declared early so collectState can reference them
let customGroups = {};
let customTabs = {};

try {
  firebase.initializeApp({
    apiKey:"AIzaSyDLw64yc5Re9_2kt2JLqKjZ2ukEd7Cajl4",
    authDomain:"voxspan-to-do-dashboard.firebaseapp.com",
    projectId:"voxspan-to-do-dashboard",
    storageBucket:"voxspan-to-do-dashboard.firebasestorage.app",
    messagingSenderId:"630457670269",
    appId:"1:630457670269:web:02f8da305a84c656e32f14"
  });
  db = firebase.firestore();
  REF = db.collection('v6').doc('dashboard');
} catch(e) { console.warn('Firebase unavailable:', e); }

// Show sync indicator
window.showSyncDot = function(ok) {
  const d = document.getElementById('sync-dot');
  const l = document.getElementById('sync-lbl');
  if (!d) return;
  d.style.background = ok ? '#00D4A8' : '#E05050';
  l.textContent = ok ? 'Synced' : 'Live';
  setTimeout(() => { d.style.background = '#C4C2D8'; l.textContent = 'Live'; }, 2000);
};

// Collect full dashboard state from DOM
function collectState() {
  const tasks = {};
  document.querySelectorAll('.item[data-id]').forEach(item => {
    const id = item.dataset.id;
    const ps = item.querySelector('[data-role="prio"]');
    const box = document.getElementById('comment-' + id);
    const isCustom = id.startsWith('c');
    tasks[id] = {
      done:    item.querySelector('.checkbox').classList.contains('done'),
      prio:    ps ? ps.value : 'later',
      owners:  ownerMap[id] || [],
      comment: box ? box.value : ''
    };
    if (isCustom) {
      const titleEl = item.querySelector('.item-title');
      const noteEl  = item.querySelector('.item-note-text');
      const grpEl   = item.closest('[id^="items-"]');
      const panelEl = item.closest('.panel');
      tasks[id].custom = {
        title:   titleEl ? titleEl.textContent.trim() : '',
        note:    noteEl  ? noteEl.textContent.trim()  : '',
        groupId: grpEl   ? grpEl.id.replace('items-', '') : '',
        tab:     panelEl ? panelEl.id.replace('panel-', '') : ''
      };
    }
  });

  const notes = {};
  [...Object.keys(TASKS), 'investors', 'b2b'].forEach(tab => {
    const key = (TASKS[tab] && TASKS[tab].noteId) || ('notes-' + tab);
    const el = document.getElementById(key);
    if (el && el.value) notes[tab] = el.value;
  });

  // Save item order per container
  const order = {};
  document.querySelectorAll('[id^="items-"]').forEach(container => {
    const ids = [...container.querySelectorAll('.item[data-id]')].map(i => i.dataset.id);
    if (ids.length) order[container.id.replace('items-', '')] = ids;
  });

  return { tasks, notes, customGroups, customTabs, order };
}

// Apply state from Firebase onto DOM
function applySnapshot(data) {
  if (!data) return;
  const { tasks, notes, order } = data;

  // Restore custom tabs
  if (data.customTabs) {
    Object.keys(data.customTabs).forEach(tabId => {
      if (document.getElementById('panel-' + tabId)) return; // already exists
      customTabs[tabId] = data.customTabs[tabId];
      renderTab(tabId, data.customTabs[tabId], '');
    });
  }

  // Restore custom groups
  if (data.customGroups) {
    Object.keys(data.customGroups).forEach(groupId => {
      if (document.getElementById('group-' + groupId)) return; // already exists
      const g = data.customGroups[groupId];
      customGroups[groupId] = g;
      renderGroup(groupId, g.label, g.tab);
    });
  }

  if (tasks) {
    // Step 1: add custom tasks missing from DOM
    Object.keys(tasks).forEach(id => {
      if (!id.startsWith('c')) return;
      if (addedCustomIds.has(id)) return;
      if (document.querySelector('[data-id="' + id + '"]')) return;
      const t = tasks[id];
      if (!t.custom) return;
      const container = document.getElementById('items-' + t.custom.groupId);
      if (!container) return;
      const item = { id, title: t.custom.title, note: t.custom.note, prio: t.prio, owner: '', custom: true };
      container.insertAdjacentHTML('beforeend', makeItemHTML(item, t.custom.tab));
      if (!customTasks[t.custom.groupId]) customTasks[t.custom.groupId] = [];
      customTasks[t.custom.groupId].push(item);
      ownerMap[id] = t.owners || [];
      renderOwnerChips(id);
      addedCustomIds.add(id);
    });

    // Step 2: remove custom tasks deleted elsewhere
    document.querySelectorAll('.item[data-id^="c"]').forEach(el => {
      if (!tasks[el.dataset.id]) {
        el.remove();
        Object.keys(customTasks).forEach(g => {
          customTasks[g] = (customTasks[g] || []).filter(t => t.id !== el.dataset.id);
        });
      }
    });

    // Step 3: apply state to ALL tasks (including newly added ones)
    Object.keys(tasks).forEach(id => {
      const item = document.querySelector('[data-id="' + id + '"]');
      if (!item) return;
      const t = tasks[id];
      const cb    = item.querySelector('.checkbox');
      const title = item.querySelector('.item-title');

      if (t.done === true  && !cb.classList.contains('done')) { cb.classList.add('done');    title.classList.add('done'); }
      if (t.done === false &&  cb.classList.contains('done')) { cb.classList.remove('done'); title.classList.remove('done'); }

      if (t.prio) {
        const ps = item.querySelector('[data-role="prio"]');
        if (ps && ps.value !== t.prio) { ps.value = t.prio; ps.className = 'ctrl prio-' + t.prio; }
        item.dataset.prio = t.prio;
        const tag = document.getElementById('prio-tag-' + id);
        if (tag) { tag.className = 'tag tag-' + t.prio; tag.textContent = PRIO_LABELS[t.prio]; }
      }

      if (t.owners) { ownerMap[id] = t.owners; renderOwnerChips(id); }

      if (t.comment !== undefined) {
        const box = document.getElementById('comment-' + id);
        const lbl = document.getElementById('comment-lbl-' + id);
        if (box && box.value !== t.comment) {
          box.value = t.comment;
          if (t.comment.trim()) {
            box.style.display = 'block';
            if (lbl) lbl.textContent = 'Hide note';
            updateNoteDot(id, true);
          }
        }
      }
    });
  }

  if (notes) {
    Object.keys(notes).forEach(tab => {
      const key = (TASKS[tab] && TASKS[tab].noteId) || ('notes-' + tab);
      const el = document.getElementById(key);
      if (el && el.value !== notes[tab]) el.value = notes[tab];
    });
  }

  // Restore item order
  if (order) {
    Object.keys(order).forEach(groupId => {
      const container = document.getElementById('items-' + groupId);
      if (!container) return;
      const ids = order[groupId];
      ids.forEach(id => {
        const item = container.querySelector('[data-id="' + id + '"]');
        if (item) container.appendChild(item);
      });
    });
  }

  // Init drag & drop on all containers
  document.querySelectorAll('[id^="items-"]').forEach(c => initDragDrop(c));

  updateAll();
  refreshDoneGroups();
  refreshFocusTab();
}

// Save everything to one Firebase document
window.saveToFirebase = function() {
  if (!REF) return;
  mySaveTime = Date.now();
  REF.set(collectState())
    .then(() => window.showSyncDot(true))
    .catch(e => console.warn('Save error:', e));
};

window.saveNotesToFirebase = function() {
  if (window.saveToFirebase) window.saveToFirebase();
};

// One listener, one document
window.startFirebaseListeners = function() {
  if (!REF) return;
  REF.onSnapshot(snap => {
    // Ignore our own saves for 1.5s
    if (Date.now() - mySaveTime < 1500) return;
    if (!snap.exists) {
      document.getElementById('overview-bar').style.opacity = '1';
      return;
    }
    applySnapshot(snap.data());
    document.getElementById('overview-bar').style.opacity = '1';
  });
};
</script>

function getOwners(id){ return ownerMap[id]||[]; }

function renderOwnerChips(id){
  const multi=document.getElementById('owner-multi-'+id);
  const tagSpan=document.getElementById('owner-tag-'+id);
  if(!multi)return;
  const owners=getOwners(id);
  multi.innerHTML=owners.map(o=>
    `<span class="owner-chip" title="${o}">${o}<span class="owner-chip-remove" onclick="event.stopPropagation();removeOwner('${id}','${o}')">×</span></span>`
  ).join('')+
  `<span class="owner-chip owner-chip-add" onclick="event.stopPropagation();showOwnerDropdown('${id}',this)">+ Add</span>`;
  // update inline tag in text-block
  if(tagSpan){
    tagSpan.innerHTML=owners.map(o=>`<span class="owner-tag">${o}</span>`).join('');
  }
  // update data-owner for filtering
  const item=document.querySelector(`[data-id="${id}"]`);
  if(item)item.dataset.owner=owners.join(',');
}

function showOwnerDropdown(id,btn){
  document.querySelectorAll('.owner-dropdown').forEach(d=>d.remove());
  const current=getOwners(id);
  const available=OWNERS.filter(o=>!current.includes(o));
  if(!available.length)return;
  const drop=document.createElement('div');
  drop.className='owner-dropdown';
  drop.innerHTML=available.map(o=>
    `<div class="owner-dropdown-item" onclick="event.stopPropagation();addOwner('${id}','${o}')">${o}</div>`
  ).join('');
  const wrap=document.getElementById('owner-multi-'+id);
  if(wrap){wrap.appendChild(drop);}
  setTimeout(()=>document.addEventListener('click',()=>drop.remove(),{once:true}),10);
}

function addOwner(id,owner){
  if(!ownerMap[id])ownerMap[id]=[];
  if(!ownerMap[id].includes(owner))ownerMap[id].push(owner);
  renderOwnerChips(id);
  document.querySelectorAll('.owner-dropdown').forEach(d=>d.remove());
  saveState();
  applyFilters();
}

function removeOwner(id,owner){
  if(!ownerMap[id])return;
  ownerMap[id]=ownerMap[id].filter(o=>o!==owner);
  renderOwnerChips(id);
  saveState();
  applyFilters();
}

function getDone(container){return [...container.querySelectorAll('.item')].filter(i=>i.querySelector('.checkbox.done'));}

function getDone(container){return [...container.querySelectorAll('.item')].filter(i=>i.querySelector('.checkbox.done'));}

function refreshDoneGroups(){
  // Query ALL item containers directly — works for default, custom segments, and custom tabs
  document.querySelectorAll('[id^="items-"]').forEach(container=>{
    if(container.closest('#panel-focus'))return; // skip focus panel clones
    const doneItems=getDone(container);
    let toggle=container.parentElement.querySelector('.done-toggle');
    if(doneItems.length===0){
      if(toggle)toggle.remove();
      container.querySelectorAll('.item').forEach(i=>i.style.display='');
      return;
    }
    const collapsed=toggle?toggle.dataset.collapsed==='true':true;
    container.querySelectorAll('.item').forEach(i=>{
      i.style.display=(i.querySelector('.checkbox.done')&&collapsed)?'none':'';
    });
    const count=getDone(container).length;
    const label=collapsed
      ? `<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg> Show completed (${count})`
      : `<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="18 15 12 9 6 15"/></svg> Hide completed (${count})`;
    if(!toggle){
      toggle=document.createElement('button');
      toggle.className='done-toggle';
      toggle.dataset.collapsed='true';
      container.parentElement.insertBefore(toggle,container.parentElement.querySelector('.add-task-btn')||container.nextSibling);
      toggle.addEventListener('click',()=>{
        const c=toggle.dataset.collapsed==='true';
        toggle.dataset.collapsed=(!c).toString();
        container.querySelectorAll('.item').forEach(i=>{
          i.style.display=(i.querySelector('.checkbox.done')&&!c)?'none':'';
        });
        const n=getDone(container).length;
        toggle.innerHTML=!c
          ? `<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg> Show completed (${n})`
          : `<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="18 15 12 9 6 15"/></svg> Hide completed (${n})`;
      });
    }
    toggle.innerHTML=label;
  });
}


function refreshFocusTab(){
  const panel=document.getElementById('panel-focus');
  if(!panel)return;
  const critical=[];
  const now=[];
  document.querySelectorAll('.item[data-id]').forEach(item=>{
    if(item.closest('#panel-focus'))return;
    if(item.querySelector('.checkbox.done'))return;
    const p=item.dataset.prio;
    if(p==='critical')critical.push(item);
    else if(p==='now')now.push(item);
  });
  const total=critical.length+now.length;
  const badge=document.getElementById('badge-focus');
  if(badge)badge.textContent=total;
  if(total===0){
    panel.innerHTML='<div class="focus-empty">🎉 Nothing critical or urgent right now. Nice work.</div>';
    return;
  }
  let html='<div style="margin-bottom:1.5rem"><div class="sec-bar" style="flex:1"><div class="sec-bar-fill" id="bar-focus" style="width:0%"></div></div></div>';
  if(critical.length){
    html+=`<div class="focus-section-label">Critical — ${critical.length} task${critical.length!==1?'s':''}</div>`;
    critical.forEach(item=>{
      const clone=item.cloneNode(true);
      clone.removeAttribute('data-tab');
      clone.removeAttribute('data-id');
      clone.querySelectorAll('[id]').forEach(el=>el.removeAttribute('id'));
      clone.querySelectorAll('[onclick]').forEach(el=>el.removeAttribute('onclick'));
      clone.querySelectorAll('select,.delete-btn,.comment-toggle,.item-comment-wrap').forEach(el=>el.remove());
      clone.style.pointerEvents='none';
      clone.style.opacity='1';
      const tab=item.closest('.panel')?.id?.replace('panel-','');
      const tabLabel=tab?`<span style="font-size:10px;color:#8A8AA8;margin-left:6px">${tab}</span>`:'';
      const titleEl=clone.querySelector('.item-title');
      if(titleEl)titleEl.insertAdjacentHTML('afterend',tabLabel);
      html+=clone.outerHTML;
    });
  }
  if(now.length){
    html+=`<div class="focus-section-label" style="margin-top:${critical.length?'1.5rem':'0'}">Now — ${now.length} task${now.length!==1?'s':''}</div>`;
    now.forEach(item=>{

// ── Edit title ───────────────────────────────────────────────────────────────
function startEditTitle(e, id, el) {
  e.stopPropagation();
  el.contentEditable = 'true';
  el.focus();
  // Move cursor to end
  const range = document.createRange();
  range.selectNodeContents(el);
  range.collapse(false);
  const sel = window.getSelection();
  sel.removeAllRanges();
  sel.addRange(range);
}

function saveItemTitle(id, el) {
  el.contentEditable = 'false';
  const newTitle = el.textContent.trim();
  if (!newTitle) { el.textContent = el.dataset.orig || 'Untitled'; }
  // Update customTasks if custom
  Object.keys(customTasks).forEach(g => {
    const t = (customTasks[g] || []).find(t => t.id === id);
    if (t) t.title = newTitle;
  });
  saveState();
}

// ── Edit note ─────────────────────────────────────────────────────────────────
function toggleNoteEdit(id) {
  const noteText = document.getElementById('note-text-' + id);
  const noteInput = document.getElementById('note-input-' + id);
  if (!noteInput) return;
  const isOpen = noteInput.style.display === 'block';
  if (isOpen) {
    noteInput.style.display = 'none';
    if (noteText) { noteText.style.display = noteInput.value.trim() ? '' : 'none'; }
  } else {
    noteInput.style.display = 'block';
    noteInput.focus();
    if (noteText) noteText.style.display = 'none';
  }
}

function saveItemNote(id, el) {
  el.style.display = 'none';
  const val = el.value.trim();
  const noteText = document.getElementById('note-text-' + id);
  if (noteText) { noteText.textContent = val; noteText.style.display = val ? '' : 'none'; }
  Object.keys(customTasks).forEach(g => {
    const t = (customTasks[g] || []).find(t => t.id === id);
    if (t) t.note = val;
  });
  saveState();
}

// ── Drag & drop reorder ───────────────────────────────────────────────────────
let dragSrc = null;

function initDragDrop(container) {
  // Remove old listeners by cloning items
  container.querySelectorAll('.item[draggable]').forEach(item => {
    // Only start drag from the handle
    const handle = item.querySelector('.drag-handle');
    if (handle) {
      handle.addEventListener('mousedown', () => { item.draggable = true; });
      handle.addEventListener('mouseup', () => { item.draggable = false; });
    }

    item.addEventListener('dragstart', e => {
      if (!item.draggable) { e.preventDefault(); return; }
      dragSrc = item;
      e.dataTransfer.effectAllowed = 'move';
      e.dataTransfer.setData('text/plain', item.dataset.id);
      setTimeout(() => item.classList.add('dragging'), 0);
    });

    item.addEventListener('dragend', () => {
      item.classList.remove('dragging');
      item.draggable = false;
      container.querySelectorAll('.item').forEach(i => i.classList.remove('drag-over'));
      dragSrc = null;
      saveState();
      updateAll();
      refreshDoneGroups();
      refreshFocusTab();
    });

    item.addEventListener('dragover', e => {
      e.preventDefault();
      e.dataTransfer.dropEffect = 'move';
      if (!dragSrc || dragSrc === item) return;
      if (!container.contains(dragSrc)) return;
      container.querySelectorAll('.item').forEach(i => i.classList.remove('drag-over'));
      item.classList.add('drag-over');
    });

    item.addEventListener('drop', e => {
      e.preventDefault();
      e.stopPropagation();
      if (!dragSrc || dragSrc === item) return;
      if (!container.contains(dragSrc)) return;
      const rect = item.getBoundingClientRect();
      const mid = rect.top + rect.height / 2;
      if (e.clientY < mid) {
        container.insertBefore(dragSrc, item);
      } else {
        container.insertBefore(dragSrc, item.nextSibling);
      }
    });
  });

  // Allow drop on the container itself (for dropping at end)
  container.addEventListener('dragover', e => e.preventDefault());
  container.addEventListener('drop', e => {
    e.preventDefault();
    if (dragSrc && container.contains(dragSrc)) {
      container.appendChild(dragSrc);
    }
  });
}

  document.getElementById('form-note-'+groupId).value='';

function addTask(groupId,tab){
  const titleEl=document.getElementById('form-title-'+groupId);
  const title=titleEl.value.trim();
  if(!title)return titleEl.focus();
  const note=document.getElementById('form-note-'+groupId).value.trim();
  const prio=document.getElementById('form-prio-'+groupId).value;
  const owner='';
  const id=uid();
  const item={id,title,note,prio,owner,custom:true};
  const container=document.getElementById('items-'+groupId);
  container.insertAdjacentHTML('beforeend',makeItemHTML(item,tab));
  ownerMap[id]=owner?[owner]:[];
  renderOwnerChips(id);
  if(!customTasks[groupId])customTasks[groupId]=[];
  customTasks[groupId].push(item);
  addedCustomIds.add(id);
  closeForm(groupId);
  initDragDrop(container);
  saveState();
  updateAll();
  refreshDoneGroups();
  refreshFocusTab();
  applyFilters();
}

function deleteTask(id,tab){
  const item=document.querySelector(`[data-id="${id}"]`);
  if(item){item.remove();}
  Object.keys(customTasks).forEach(g=>{
    customTasks[g]=customTasks[g].filter(t=>t.id!==id);
  });
  localStorage.removeItem('vox-comment-'+id);
  saveState();
  updateAll();
}

function showTab(id,el){
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('panel-'+id).classList.add('active');
  el.classList.add('active');

function toggleItem(id){
  const item=document.querySelector(`[data-id="${id}"]`);
  const cb=item.querySelector('.checkbox');
  const title=item.querySelector('.item-title');
  const wasUndone=!cb.classList.contains('done');
  cb.classList.toggle('done');
  title.classList.toggle('done');
  if(wasUndone && typeof confetti!=='undefined'){
    const rect=cb.getBoundingClientRect();
    confetti({
      particleCount:60,
      spread:55,
      startVelocity:28,
      origin:{x:rect.left/window.innerWidth, y:rect.top/window.innerHeight},
      colors:['#5B3FD0','#00D4A8','#BBA8F7','#7AE8D2','#9178F2'],
      ticks:180,
      scalar:0.85
    });
  }
  saveState();updateAll();
  refreshDoneGroups();
  refreshFocusTab();
}

  if(isOpen){
    box.style.display='none';
    lbl.textContent='Add note';
  } else {
    box.style.display='block';
    lbl.textContent='Hide note';
    setTimeout(()=>box.focus(),10);
  }
}

function applyFilters(){
  const q=document.getElementById('search-box').value.toLowerCase().trim();
  const owner=document.getElementById('filter-owner').value;
  const prio=document.getElementById('filter-prio').value;
  let visible=0;
  document.querySelectorAll('.item[data-id]').forEach(item=>{
    const title=item.querySelector('.item-title').textContent.toLowerCase();
    const note=item.querySelector('.item-note-text')?.textContent.toLowerCase()||'';
    const matchQ=!q||(title.includes(q)||note.includes(q));
    const matchOwner=!owner||(item.dataset.owner||'').includes(owner);
    const matchPrio=!prio||(item.dataset.prio||'')===prio;
    const show=matchQ&&matchOwner&&matchPrio;
    item.classList.toggle('hidden',!show);
    if(show)visible++;
  });
  const total=document.querySelectorAll('.item[data-id]').length;
  const countEl=document.getElementById('search-count');
  const noRes=document.getElementById('no-results');
  if(q||owner||prio){
    countEl.textContent=`${visible} of ${total} tasks`;
    noRes.classList.toggle('show',visible===0);
  } else {
    countEl.textContent='';noRes.classList.remove('show');
  }
}

function clearFilters(){
  document.getElementById('search-box').value='';
  document.getElementById('filter-owner').value='';
  document.getElementById('filter-prio').value='';
  applyFilters();
}

function updateAll(){
  let totalAll=0,doneAll=0;
  const allTabs = [...TASK_TABS, ...Object.keys(customTabs)];
  allTabs.forEach(tab=>{
    const items=document.querySelectorAll(`[data-tab="${tab}"]`);
    const total=items.length;
    const done=[...items].filter(i=>i.querySelector('.checkbox.done')).length;
    totalAll+=total;doneAll+=done;
    const pct=total>0?Math.round((done/total)*100):0;
    const bar=document.getElementById('bar-'+tab);
    const pctEl=document.getElementById('pct-'+tab);
    const badge=document.getElementById('badge-'+tab);
    if(bar)bar.style.width=pct+'%';
    if(pctEl)pctEl.textContent=pct+'%';
    if(badge)badge.textContent=done+'/'+total;
  });
  const overall=totalAll>0?Math.round((doneAll/totalAll)*100):0;
  document.getElementById('overall-pct').textContent=overall+'%';
  document.getElementById('overall-fill').style.width=overall+'%';
  document.getElementById('stat-done').textContent=doneAll;
  document.getElementById('stat-left').textContent=totalAll-doneAll;
  document.getElementById('stat-total').textContent=totalAll;
}

let noteTimers={},commentTimers={};
function saveTabNote(tab){
  clearTimeout(noteTimers[tab]);
  noteTimers[tab]=setTimeout(()=>{
    const key=TASKS[tab]?.noteId||('notes-'+tab);
    const el=document.getElementById(key);
    if(el){
      if(window.saveToFirebase)window.saveToFirebase();
    }
    const s=document.getElementById('saved-'+tab);
    if(s){s.classList.add('show');setTimeout(()=>s.classList.remove('show'),1500);}
  },600);
}
function saveComment(id){
  clearTimeout(commentTimers[id]);
  commentTimers[id]=setTimeout(()=>{
    const el=document.getElementById('comment-'+id);
    if(el){
      updateNoteDot(id,el.value.trim().length>0);
      if(window.saveToFirebase)window.saveToFirebase();
    }
  },600);
}

function updateNoteDot(id,hasContent){
  const btn=document.getElementById('comment-btn-'+id);
  if(!btn)return;
  let dot=btn.querySelector('.note-dot');
  if(hasContent&&!dot){
    dot=document.createElement('span');
    dot.className='note-dot';
    btn.appendChild(dot);
  } else if(!hasContent&&dot){
    dot.remove();
  }
}

function saveState(){
  if(window.saveToFirebase) window.saveToFirebase();
}

function initUI(){
  // Init owner chips with defaults
  document.querySelectorAll('.item[data-id]').forEach(item => {
    const id = item.dataset.id;
    if (!ownerMap[id]) { const def = item.dataset.owner; ownerMap[id] = def ? [def] : []; }
    renderOwnerChips(id);
  });
  // Tab notes restored by Firebase snapshot
  // Comment blur handlers + Enter key
  document.querySelectorAll('.item[data-id]').forEach(item=>{
    const id=item.dataset.id;
    const box=document.getElementById('comment-'+id);
    const lbl=document.getElementById('comment-lbl-'+id);
    if(box){
      box.addEventListener('blur',()=>{
        if(!box.value.trim()){
          box.style.display='none';
          if(lbl)lbl.textContent='Add note';
          localStorage.removeItem('vox-comment-'+id);
        }
      });
    }
  });
  document.querySelectorAll('[id^="form-title-"]').forEach(input=>{
    const groupId=input.id.replace('form-title-','');
    const panel=input.closest('.panel');
    const tab=panel?.id?.replace('panel-','')||'';
    input.addEventListener('keydown',e=>{if(e.key==='Enter')addTask(groupId,tab);});
  });
  // Init drag & drop on all containers
  document.querySelectorAll('[id^="items-"]').forEach(c => initDragDrop(c));
}


buildTasks();

// Wipe ALL stale localStorage data
Object.keys(localStorage).filter(k => k.startsWith('vox-')).forEach(k => localStorage.removeItem(k));

initUI();
updateAll();
applyFilters();
refreshDoneGroups();
refreshFocusTab();

try {
  if (window.startFirebaseListeners) window.startFirebaseListeners();
} catch(e) {
  console.warn('Firebase unavailable');
  document.getElementById('overview-bar').style.opacity = '1';
}

// Close open comment boxes when clicking outside
document.addEventListener('click', function(e) {
  if (!e.target.closest('.item-comment-wrap')) {
    document.querySelectorAll('.comment-box').forEach(box => {
      if (box.style.display === 'block') {
        const id = box.id.replace('comment-', '');
        const lbl = document.getElementById('comment-lbl-' + id);
        box.style.display = 'none';
        if (lbl) lbl.textContent = 'Add note';
        updateNoteDot(id, box.value.trim().length > 0);
      }
    });
  }
});

</script>
<div class="add-tab-overlay" id="add-tab-overlay" onclick="closeAddTabForm()"></div>
<div class="add-tab-form" id="add-tab-form">
  <h3>New tab</h3>
  <input id="new-tab-input" placeholder="Tab name (e.g. Design, Operations…)" onkeydown="if(event.key==='Enter')document.getElementById('new-tab-seg-input').focus()">
  <input id="new-tab-seg-input" placeholder="First segment name (e.g. Tasks)" onkeydown="if(event.key==='Enter')addTab()">
  <div class="add-group-form-actions">
    <button class="btn-cancel" onclick="closeAddTabForm()">Cancel</button>
    <button class="btn-add" onclick="addTab()">Create tab</button>
  </div>
</div>
